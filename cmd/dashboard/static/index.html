<head>

<title>db-engine</title>

<style>
/* ── Shared constants ────────────────────────────────────────────────────── */
:root {
  --grad:       linear-gradient(135deg, #fb7185 0%, #fb923c 100%);
  --grad-shine: linear-gradient(135deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 55%);
}

/* ── Light theme ─────────────────────────────────────────────────────────── */
html[data-theme="light"] {
  --bg:            #f0eee9;
  --card-bg:       #ffffff;
  --card-border:   rgba(0,0,0,.06);
  --card-shadow:   0 2px 12px rgba(0,0,0,.05), 0 0 0 1px rgba(0,0,0,.04);
  --text-1:        #18181b;
  --text-2:        #71717a;
  --text-3:        #a1a1aa;
  --divider:       rgba(0,0,0,.07);
  --item-hover:    rgba(0,0,0,.04);
  --item-active:   rgba(251,113,133,.08);
  --active-border: rgba(251,113,133,.22);
  --accent:        #fb7185;
  --accent-hi:     #fb923c;
  --accent-dim:    rgba(251,113,133,.1);
  --accent-glow:   rgba(251,113,133,.3);
  --secondary:     #a855f7;
  --secondary-dim: rgba(168,85,247,.1);
  --red:           #ef4444;
  --green:         #22c55e;
  --amber:         #f59e0b;
  --violet:        #a855f7;
  --cyan:          #06b6d4;
  --tbl-stripe:    rgba(0,0,0,.018);
  --tbl-hover:     rgba(251,113,133,.05);
  --cm-bg:         #ffffff;
  --cm-gutter:     #f8f8f7;
  --cm-gutter-b:   rgba(0,0,0,.05);
  --cm-linenum:    #c4c4cc;
  --cm-cursor:     #fb7185;
  --cm-select:     rgba(251,113,133,.15);
  --cm-active:     rgba(0,0,0,.02);
  --cm-kw:         #8b5cf6;
  --cm-str:        #16a34a;
  --cm-num:        #f97316;
  --cm-cmt:        #a1a1aa;
  --cm-op:         #71717a;
}

/* ── Dark theme ──────────────────────────────────────────────────────────── */
html[data-theme="dark"] {
  --bg:            #1c1b1a;
  --card-bg:       #272524;
  --card-border:   rgba(255,255,255,.06);
  --card-shadow:   0 4px 24px rgba(251,113,133,.07), 0 0 0 1px rgba(255,255,255,.04);
  --text-1:        #f5f5f4;
  --text-2:        #a8a29e;
  --text-3:        #57534e;
  --divider:       rgba(255,255,255,.07);
  --item-hover:    rgba(255,255,255,.05);
  --item-active:   rgba(251,113,133,.1);
  --active-border: rgba(251,113,133,.22);
  --accent:        #fb7185;
  --accent-hi:     #fb923c;
  --accent-dim:    rgba(251,113,133,.12);
  --accent-glow:   rgba(251,113,133,.28);
  --secondary:     #c084fc;
  --secondary-dim: rgba(192,132,252,.12);
  --red:           #f87171;
  --green:         #4ade80;
  --amber:         #fbbf24;
  --violet:        #c084fc;
  --cyan:          #67e8f9;
  --tbl-stripe:    rgba(255,255,255,.02);
  --tbl-hover:     rgba(251,113,133,.06);
  --cm-bg:         #1f1e1d;
  --cm-gutter:     #1a1918;
  --cm-gutter-b:   rgba(255,255,255,.04);
  --cm-linenum:    #44403c;
  --cm-cursor:     #fb7185;
  --cm-select:     rgba(251,113,133,.15);
  --cm-active:     rgba(255,255,255,.02);
  --cm-kw:         #c084fc;
  --cm-str:        #4ade80;
  --cm-num:        #fb923c;
  --cm-cmt:        #57534e;
  --cm-op:         #78716c;
}

/* (light theme is now defined above in the :root / light block) */

/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, sans-serif;
  font-size: 13px;
  color: var(--text-1);
  background: var(--bg);
  transition: background .35s ease, color .25s ease;
}

/* ── Background — visible accent blobs ──────────────────────────────────── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
  transition: background .35s ease;
}
html[data-theme="light"] .bg-layer {
  background:
    radial-gradient(ellipse 60% 50% at 95% 5%,  rgba(251,113,133,.12) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 5%  92%, rgba(251,146,60,.10)  0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 52% 88%, rgba(253,186,116,.07) 0%, transparent 55%),
    var(--bg);
}
html[data-theme="dark"] .bg-layer {
  background:
    radial-gradient(ellipse 55% 45% at 95% 5%,  rgba(251,113,133,.16) 0%, transparent 60%),
    radial-gradient(ellipse 45% 38% at 4%  92%, rgba(251,146,60,.13)  0%, transparent 55%),
    radial-gradient(ellipse 38% 32% at 52% 86%, rgba(251,113,133,.08) 0%, transparent 50%),
    var(--bg);
}
#bg-svg { display: none; }

/* ── Card — with top highlight ───────────────────────────────────────────── */
.glass {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  /* top edge catches light, rest is normal shadow */
  box-shadow: var(--card-shadow), inset 0 1px 0 rgba(255,255,255,.08);
  transition: background .35s, border-color .35s, box-shadow .35s;
}
html[data-theme="light"] .glass {
  box-shadow: var(--card-shadow), inset 0 1px 0 rgba(255,255,255,.9);
}

/* ── App shell ───────────────────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-rows: 54px 1fr 28px;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--divider);
}
.header-left  { display: flex; align-items: center; gap: 12px; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* Logo */
.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-svg {
  width: 28px; height: 28px; color: #fb7185;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 8px rgba(251,113,133,.45));
  transition: filter .3s;
}
.logo-text {
  font-size: 17px; font-weight: 800; letter-spacing: -.04em;
  background: var(--grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-text span { color: inherit; }

/* DB path badge */
.db-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: var(--text-3);
  background: var(--item-hover); border: 1px solid var(--divider);
  padding: 2px 10px; border-radius: 999px;
  transition: background .35s, border-color .35s, color .35s;
}

/* Pool stats */
.pool-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--text-2);
  background: var(--accent-dim); border: 1px solid rgba(251,113,133,.2);
  padding: 3px 12px; border-radius: 999px; transition: all .25s;
}
.pool-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0; transition: background .3s;
}
.pool-num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3);
}

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 2px;
}
.ti {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  opacity: .4; transition: opacity .3s, color .3s;
  flex-shrink: 0; color: var(--text-2);
}
.ti svg { width: 14px; height: 14px; fill: currentColor; }
html[data-theme="light"] .ti-sun  { opacity: 1; color: #fb7185; }
html[data-theme="dark"]  .ti-moon { opacity: 1; color: #fb7185; }
.toggle-track {
  width: 38px; height: 20px; border-radius: 999px;
  border: 1px solid rgba(251,113,133,.3);
  background: var(--accent-dim);
  position: relative; transition: background .35s, border-color .35s; flex-shrink: 0;
}
.toggle-thumb {
  position: absolute; top: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--grad);
  box-shadow: 0 1px 4px rgba(251,113,133,.45);
  transition: left .28s cubic-bezier(.34,1.4,.64,1);
}
html[data-theme="dark"]  .toggle-thumb { left: 21px; }
html[data-theme="light"] .toggle-thumb { left: 3px; }

/* ── Layout ──────────────────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 256px 1fr;
  overflow: hidden;
  gap: 10px;
  padding: 0 10px 10px;
}

/* ── Sidebar — consistent with other panels ──────────────────────────────── */
.sidebar {
  display: flex; flex-direction: column;
  border-radius: 22px; overflow: hidden;
  /* inherits .glass (card-bg + card-shadow) */
  /* right border for visual column separation */
  border-right: 1px solid var(--divider) !important;
}

.sidebar-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px 9px; flex-shrink: 0;
  border-bottom: 1px solid var(--divider);
}

.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-3);
}

.icon-btn {
  width: 24px; height: 24px; border: none;
  background: transparent; color: var(--text-3);
  border-radius: 8px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, background .15s;
}
.icon-btn:hover { color: var(--accent); background: var(--accent-dim); }

.tbl-list { flex: 1; overflow-y: auto; padding: 6px 8px 12px; }
.tbl-list::-webkit-scrollbar { width: 3px; }
.tbl-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }

/* Table item */
.tbl-item {
  border-radius: 12px; margin-bottom: 2px; cursor: pointer;
  overflow: hidden; border: 1px solid transparent;
  transition: background .12s, border-color .12s;
}
.tbl-item:hover { background: var(--item-hover); }
.tbl-item.active {
  background: rgba(251,113,133,.1);
  border-color: rgba(251,113,133,.2);
}
.tbl-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; }

.tbl-icon-svg {
  width: 14px; height: 14px; color: var(--text-3);
  flex-shrink: 0; transition: color .15s;
}
.tbl-item.active .tbl-icon-svg { color: var(--accent); }

.tbl-name {
  font-size: 12.5px; font-weight: 500; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text-2); transition: color .15s;
}
.tbl-item.active .tbl-name { color: var(--text-1); font-weight: 600; }

.tbl-rows {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3);
}

/* Details panel */
.tbl-details { padding: 0 10px 10px 30px; animation: fadeSlide .15s ease-out; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.detail-group { margin-top: 8px; }
.detail-head {
  font-size: 9.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-3); margin-bottom: 4px;
}
.col-row, .idx-row, .stat-row {
  display: flex; align-items: center; justify-content: space-between; padding: 2px 0;
}
.col-n, .idx-n {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-2);
}
.type-badge {
  font-size: 9.5px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  padding: 1px 8px; border-radius: 999px;
}
html[data-theme="light"] .type-badge.INT  { color: #0891b2; background: rgba(8,145,178,.1); }
html[data-theme="light"] .type-badge.TEXT { color: #16a34a; background: rgba(22,163,74,.1); }
html[data-theme="dark"]  .type-badge.INT  { color: #67e8f9; background: rgba(103,232,249,.1); }
html[data-theme="dark"]  .type-badge.TEXT { color: #4ade80; background: rgba(74,222,128,.1); }
.idx-col {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--violet);
}
.stat-k { font-size: 10.5px; color: var(--text-3); }
.stat-v { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-2); }
.pk-icon { margin-left: 3px; font-size: 10px; vertical-align: middle; }
.col-idx-badge {
  font-size: 9px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  padding: 0 6px; border-radius: 999px; margin-left: 3px; vertical-align: middle;
  color: var(--violet); background: var(--secondary-dim); border: 1px solid rgba(168,85,247,.2);
}
.analyze-hint {
  width: 100%; margin-top: 5px; padding: 5px 10px; border-radius: 8px;
  border: 1px dashed rgba(251,191,36,.35); background: rgba(251,191,36,.06);
  color: var(--amber); font-size: 11px; cursor: pointer; text-align: center;
  transition: background .15s, border-color .15s;
  font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
}
.analyze-hint:hover { background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.55); }
.sidebar-empty {
  padding: 24px 14px; text-align: center;
  color: var(--text-3); font-size: 12px; line-height: 1.7;
}
.sidebar-empty code {
  font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 11px;
}

/* ── Main area ───────────────────────────────────────────────────────────── */
.main { display: flex; flex-direction: column; overflow: hidden; gap: 10px; min-height: 0; }

/* ── Editor panel ────────────────────────────────────────────────────────── */
.editor-panel { flex-shrink: 0; border-radius: 22px; overflow: hidden; }

.panel-bar {
  display: flex; align-items: center; justify-content: space-between; padding: 10px 16px;
}
.panel-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-3);
}
.editor-actions { display: flex; gap: 6px; align-items: center; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 16px; border-radius: 11px;
  font-size: 12px; font-weight: 600;
  font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
  cursor: pointer; border: 1px solid transparent;
  transition: all .15s; white-space: nowrap; line-height: 1.4;
  position: relative; overflow: hidden;
}
.btn:disabled { opacity: .42; cursor: not-allowed; }

.btn-run {
  background: var(--grad);
  color: #fff; border-color: transparent;
  box-shadow: 0 3px 16px rgba(251,113,133,.38);
}
/* shine overlay — static on top, appears on hover */
.btn-run::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--grad-shine);
  opacity: 0;
  transition: opacity .25s ease;
  border-radius: inherit;
  pointer-events: none;
}
.btn-run:hover:not(:disabled)::before { opacity: 1; }
.btn-run:hover:not(:disabled) {
  box-shadow: 0 5px 22px rgba(251,113,133,.52);
  transform: translateY(-1px);
}

.btn-ghost {
  background: var(--item-hover); color: var(--text-2); border-color: var(--divider);
}
.btn-ghost:hover:not(:disabled) {
  color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim);
}

.btn-teal {
  background: transparent; color: var(--accent); border-color: rgba(251,113,133,.3);
}
.btn-teal:hover:not(:disabled) { background: var(--accent-dim); }

#editor-wrap { padding: 0 14px 4px; }

/* ── CodeMirror ──────────────────────────────────────────────────────────── */
.cm-s-dbe.CodeMirror {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; line-height: 1.7; height: 165px;
  border: 1.5px solid var(--divider); border-radius: 14px;
  transition: border-color .2s, background .35s;
}
.cm-s-dbe.CodeMirror-focused { border-color: #fb7185 !important; }
html[data-theme="dark"]  .cm-s-dbe.CodeMirror { background: var(--cm-bg); color: var(--text-1); }
html[data-theme="light"] .cm-s-dbe.CodeMirror { background: var(--cm-bg); color: var(--text-1); }
.cm-s-dbe .CodeMirror-gutters {
  background: var(--cm-gutter); border-right: 1px solid var(--cm-gutter-b);
  min-width: 38px; transition: background .35s;
}
.cm-s-dbe .CodeMirror-linenumber { color: var(--cm-linenum); font-size: 11px; padding: 0 7px; }
.cm-s-dbe .CodeMirror-cursor { border-left: 2px solid var(--cm-cursor); }
.cm-s-dbe .CodeMirror-selected { background: var(--cm-select) !important; }
.cm-s-dbe .CodeMirror-activeline-background { background: var(--cm-active); }
.cm-s-dbe .CodeMirror-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
.cm-s-dbe .CodeMirror-scroll::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }
.cm-s-dbe .cm-keyword  { color: var(--cm-kw); font-weight: 500; }
.cm-s-dbe .cm-builtin  { color: var(--cyan); }
.cm-s-dbe .cm-string   { color: var(--cm-str); }
.cm-s-dbe .cm-number   { color: var(--cm-num); }
.cm-s-dbe .cm-comment  { color: var(--cm-cmt); font-style: italic; }
.cm-s-dbe .cm-operator { color: var(--cm-op); }
.cm-s-dbe .cm-variable { color: var(--text-1); }

.editor-hint {
  font-size: 10.5px; color: var(--text-3);
  padding: 3px 16px 8px;
  display: flex; align-items: center; gap: 12px;
}
kbd {
  font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
  background: var(--item-hover); border: 1px solid var(--divider);
  border-radius: 6px; padding: 1px 6px; color: var(--text-2);
}

/* ── Query History ───────────────────────────────────────────────────────── */
.hist-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-top: 1px solid var(--divider);
  cursor: pointer; transition: background .12s; flex-shrink: 0; user-select: none;
}
.hist-bar:hover { background: var(--item-hover); }
.hist-bar-label { font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--text-3); }
.hist-count {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent);
  background: var(--accent-dim); border: 1px solid rgba(251,113,133,.2);
  padding: 0 7px; border-radius: 999px; min-width: 20px; text-align: center;
}
.hist-chevron { margin-left: auto; color: var(--text-3); font-size: 11px; transition: transform .22s cubic-bezier(.4,0,.2,1); }
.hist-bar.open .hist-chevron { transform: rotate(180deg); }
.hist-panel { max-height: 0; overflow: hidden; transition: max-height .22s cubic-bezier(.4,0,.2,1); }
.hist-panel.open { max-height: 140px; }
.hist-list { overflow-y: auto; max-height: 140px; padding: 4px 8px 5px; }
.hist-list::-webkit-scrollbar { width: 3px; }
.hist-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }
.hist-item { display: flex; align-items: center; gap: 8px; padding: 3px 8px; border-radius: 8px; cursor: pointer; transition: background .1s; }
.hist-item:hover { background: var(--item-hover); }
.hist-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.hist-sql { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hist-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-3); flex-shrink: 0; }

/* ── Results panel ───────────────────────────────────────────────────────── */
.results-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; border-radius: 22px; min-height: 0;
}
.results-meta {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-3);
}
.results-body { flex: 1; overflow: auto; transition: opacity .15s; }
.results-body.loading { opacity: .4; pointer-events: none; }
.results-body::-webkit-scrollbar { width: 5px; height: 5px; }
.results-body::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; height: 100%;
  min-height: 80px; color: var(--text-3); animation: fadeIn .3s ease-out;
}
.empty-icon { opacity: .28; }
.empty-state p { font-size: 13px; }

/* ── Result table ────────────────────────────────────────────────────────── */
.result-wrap { overflow: auto; max-height: 100%; animation: fadeIn .22s ease-out; }
.result-wrap::-webkit-scrollbar { width: 5px; height: 5px; }
.result-wrap::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }
.result-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }
.result-table th {
  position: sticky; top: 0;
  background: var(--card-bg); color: var(--text-2);
  font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  text-align: left; padding: 7px 14px; border-bottom: 1px solid var(--divider);
  white-space: nowrap; transition: background .35s;
}
.result-table td {
  padding: 6px 14px; border-bottom: 1px solid rgba(128,128,128,.04);
  white-space: nowrap; max-width: 340px; overflow: hidden; text-overflow: ellipsis;
}
.result-table tbody tr:nth-child(even) td { background: var(--tbl-stripe); }
.result-table tbody tr:hover td { background: var(--tbl-hover); }
.result-table td.num  { color: var(--cm-num); text-align: right; }
.result-table th.num  { text-align: right; }
.null-val { color: var(--text-3); font-style: italic; }

/* ── Message / error boxes ───────────────────────────────────────────────── */
.msg-box {
  display: flex; align-items: flex-start; gap: 10px;
  margin: 14px; padding: 12px 16px; border-radius: 14px;
  font-size: 13px; animation: fadeIn .2s ease-out;
}
.msg-box.success {
  background: rgba(74,222,128,.07); border: 1px solid rgba(74,222,128,.2); color: var(--green);
}
.msg-box.error {
  background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); color: var(--red);
}
.msg-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.msg-text { word-break: break-word; line-height: 1.5; }

/* ── Plan tree ───────────────────────────────────────────────────────────── */
.plan-tree { padding: 14px 16px; animation: fadeIn .2s ease-out; overflow: auto; }
.plan-node-outer { position: relative; }
.plan-node-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; cursor: default; position: relative;
}
.plan-children {
  margin-left: 18px; padding-left: 14px; border-left: 1.5px solid var(--divider);
}
.plan-children > .plan-node-outer > .plan-node-row::before {
  content: ''; position: absolute; left: -14px; top: 50%;
  width: 14px; height: 1.5px; background: var(--divider);
}
.plan-badge {
  font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 11.5px;
  padding: 2px 10px; border-radius: 999px; border: 1px solid; flex-shrink: 0;
  letter-spacing: -.01em; transition: box-shadow .15s, transform .1s;
}
.plan-node-row:hover .plan-badge { box-shadow: 0 0 10px currentColor; transform: translateY(-1px); }
.plan-rest { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-2); transition: color .12s; }
.plan-node-row:hover .plan-rest { color: var(--text-1); }
.plan-tip {
  font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; font-size: 12px; color: var(--text-1);
  line-height: 1.55; background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 10px 14px; box-shadow: 0 8px 30px rgba(0,0,0,.15);
  white-space: pre-wrap; word-break: break-word; animation: fadeIn .1s ease-out;
}

/* ── Multi-statement stack ───────────────────────────────────────────────── */
.multi-stack { animation: fadeIn .2s ease-out; }
.stmt-card { border-bottom: 1px solid var(--divider); }
.stmt-card:last-child { border-bottom: none; }
.stmt-header {
  display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: var(--item-hover);
}
.stmt-num {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent-dim); border: 1px solid rgba(251,113,133,.2);
  color: var(--accent); font-size: 9px; font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stmt-dur { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-3); }
.stmt-rows { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--accent); margin-left: auto; }
.stmt-err-tag {
  font-size: 9.5px; font-weight: 600; color: var(--red);
  background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.2);
  border-radius: 999px; padding: 1px 8px; margin-left: auto;
}
.stmt-ok-msg {
  display: flex; align-items: center; gap: 7px; padding: 7px 14px; font-size: 12px; color: var(--green);
}

/* ── Status bar ──────────────────────────────────────────────────────────── */
.statusbar {
  display: flex; align-items: center; padding: 0 18px;
  border-top: 1px solid var(--divider); gap: 6px;
}
#status-text { font-size: 11px; color: var(--text-3); }
#status-text.ok  { color: var(--green); }
#status-text.err { color: var(--red); }

/* ── Spinner ─────────────────────────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 11px; height: 11px;
  border: 2px solid rgba(255,255,255,.2); border-top-color: rgba(255,255,255,.85);
  border-radius: 50%; animation: spin .5s linear infinite; vertical-align: middle;
}

/* ── Animations ──────────────────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let editor       = null;
let allTables    = [];
let activeTable  = null;
let darkMode     = true;
let histOpen     = false;
let queryHistory = [];
const HIST_KEY   = 'dbe_history';

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initEditor();
  loadTables();
  loadPoolStats();
  loadHistory();
  setInterval(loadPoolStats, 6000);
  document.getElementById('db-badge').textContent = window.location.host;
});

// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  darkMode = !darkMode;
  document.documentElement.dataset.theme = darkMode ? 'dark' : 'light';
}

// ── CodeMirror ─────────────────────────────────────────────────────────────
function initEditor() {
  editor = CodeMirror.fromTextArea(document.getElementById('sql-editor'), {
    mode: 'text/x-sql',
    theme: 'dbe',
    lineNumbers: true,
    autofocus: true,
    lineWrapping: true,
    tabSize: 2,
    indentWithTabs: false,
    extraKeys: {
      'Ctrl-Enter': () => runQuery(),
      'Cmd-Enter':  () => runQuery(),
    },
  });
}

// ── API ────────────────────────────────────────────────────────────────────
async function apiGet(path) {
  const r = await fetch(path);
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Sidebar ────────────────────────────────────────────────────────────────
async function loadTables() {
  try { allTables = await apiGet('/api/tables'); }
  catch (_) { allTables = []; }
  renderSidebar();
}

async function refreshTables() {
  await loadTables();
  setStatus('Tables refreshed', 'ok');
}

function renderSidebar() {
  const list = document.getElementById('tbl-list');
  if (!allTables || allTables.length === 0) {
    list.innerHTML = `
      <div class="sidebar-empty">
        No tables yet.<br>
        Try <code>CREATE TABLE t (id INT, name TEXT);</code>
      </div>`;
    return;
  }
  list.innerHTML = allTables.map(t => {
    const active   = t.name === activeTable;
    const rowCount = t.stats ? fmtNum(t.stats.rowCount) + 'r' : '';
    // violet icon for indexed tables, accent for plain
    const iconColor = (t.indexes && t.indexes.length > 0) ? 'var(--violet)' : 'var(--accent)';
    return `
      <div class="tbl-item${active ? ' active' : ''}" onclick="selectTable(${q(t.name)})">
        <div class="tbl-row">
          <svg class="tbl-icon-svg" viewBox="0 0 14 14" fill="none" style="color:${iconColor}">
            <rect x="1.5" y="1.5" width="11" height="11" rx="2.5" fill="currentColor" opacity=".15" stroke="currentColor" stroke-width="1.1"/>
            <line x1="4" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="4" y1="7.5" x2="10" y2="7.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
            <line x1="4" y1="10" x2="7.5" y2="10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
          <span class="tbl-name">${esc(t.name)}</span>
          ${rowCount ? `<span class="tbl-rows">${rowCount}</span>` : ''}
        </div>
        ${active ? renderDetails(t) : ''}
      </div>`;
  }).join('');
}

function renderDetails(t) {
  // index lookup: column → [indexName, ...]
  const idxMap = {};
  for (const idx of (t.indexes || [])) {
    if (!idxMap[idx.column]) idxMap[idx.column] = [];
    idxMap[idx.column].push(idx.name);
  }
  // first INT column = primary key (engine convention)
  const pkCol = ((t.columns || []).find(c => c.type === 'INT') || {}).name;

  const cols = (t.columns || []).map(c => {
    const pk = c.name === pkCol
      ? `<svg class="pk-icon" title="Primary key" width="10" height="10" viewBox="0 0 14 14" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-left:3px"><circle cx="5.5" cy="7" r="3"/><line x1="7.8" y1="7" x2="13" y2="7"/><line x1="11" y1="5.5" x2="11" y2="8.5"/><line x1="13" y1="5.5" x2="13" y2="8.5"/></svg>` : '';
    const idxBadges = (idxMap[c.name] || []).map(n =>
      `<span class="col-idx-badge" title="${esc(n)}">idx</span>`
    ).join('');
    return `<div class="col-row">
      <span class="col-n">${esc(c.name)}${pk}${idxBadges}</span>
      <span class="type-badge ${c.type}">${esc(c.type)}</span>
    </div>`;
  }).join('');

  const idxs = (t.indexes || []).length === 0 ? '' : `
    <div class="detail-group">
      <div class="detail-head">Indexes</div>
      ${t.indexes.map(i => `
        <div class="idx-row">
          <span class="idx-n">${esc(i.name)}</span>
          <span class="idx-col" style="color:var(--violet)">→ ${esc(i.column)}</span>
        </div>`).join('')}
    </div>`;

  const statsHtml = !t.stats
    ? `<div class="detail-group">
        <button class="analyze-hint" onclick="event.stopPropagation();analyzeTableByName(${q(t.name)})">
          Run ANALYZE for statistics
        </button>
       </div>`
    : `<div class="detail-group">
        <div class="detail-head">Statistics</div>
        <div class="stat-row">
          <span class="stat-k">rows</span>
          <span class="stat-v">${fmtNum(t.stats.rowCount)}</span>
        </div>
        ${(t.stats.columns || []).filter(c => c.nDistinct > 0).map(c => {
          const range = (c.max > 0 && c.max !== c.min) ? ` [${c.min}–${c.max}]` : '';
          return `<div class="stat-row">
            <span class="stat-k">${esc(c.name)}</span>
            <span class="stat-v">${fmtNum(c.nDistinct)} distinct${range}</span>
          </div>`;
        }).join('')}
      </div>`;

  return `<div class="tbl-details">
    <div class="detail-group">
      <div class="detail-head">Columns</div>
      ${cols}
    </div>
    ${idxs}
    ${statsHtml}
  </div>`;
}

async function analyzeTableByName(name) {
  setRunning(true);
  try {
    const data = await apiPost('/api/query', { sql: `ANALYZE ${name}` });
    const r = data.results && data.results[0];
    if (r && r.error) setStatus(r.error, 'err');
    else { setStatus((r && r.message) || 'ANALYZE complete', 'ok'); await loadTables(); }
  } finally { setRunning(false); }
}

function selectTable(name) {
  activeTable = name;
  renderSidebar();
  document.getElementById('analyze-btn').style.display = '';
  const sql = `SELECT * FROM ${name} LIMIT 50;`;
  editor.setValue(sql);
  editor.setCursor({ line: 0, ch: editor.getLine(0).length });
  editor.focus();
}

// ── Query ──────────────────────────────────────────────────────────────────
async function runQuery() {
  const sql = editor.getValue().trim();
  if (!sql) return;
  setRunning(true);
  try {
    const data = await apiPost('/api/query', { sql });
    renderMulti(data);
    const ok  = !data.results.some(r => r.error);
    const dur = data.totalDuration || (data.results[0] && data.results[0].duration) || '';
    addToHistory(sql, ok, dur);
    if (/\b(CREATE|DROP|ANALYZE)\b/i.test(sql)) await loadTables();
  } catch (e) {
    showError(e.message);
    addToHistory(sql, false, '');
  } finally {
    setRunning(false);
  }
}

async function explainQuery() {
  const stmts = splitSQL(editor.getValue().trim());
  const first = stmts[0] || '';
  if (!first.toUpperCase().startsWith('SELECT')) {
    setStatus('EXPLAIN only works with a SELECT', 'err');
    return;
  }
  setRunning(true);
  try {
    const data = await apiPost('/api/query', { sql: 'EXPLAIN ' + first });
    renderMulti(data);
    const dur = (data.results && data.results[0] && data.results[0].duration) || '';
    addToHistory('EXPLAIN ' + first, 'explain', dur);
  } catch (e) {
    showError(e.message);
  } finally {
    setRunning(false);
  }
}

async function analyzeTable() {
  if (!activeTable) return;
  await analyzeTableByName(activeTable);
}

function splitSQL(sql) {
  const stmts = [];
  let buf = '', inStr = false;
  for (let i = 0; i < sql.length; i++) {
    const ch = sql[i];
    if      (ch === "'" && !inStr) { inStr = true;  buf += ch; }
    else if (ch === "'" && inStr)  {
      if (sql[i+1] === "'") { buf += "''"; i++; }
      else { inStr = false; buf += ch; }
    }
    else if (ch === ';' && !inStr) { if (buf.trim()) stmts.push(buf.trim()); buf = ''; }
    else buf += ch;
  }
  if (buf.trim()) stmts.push(buf.trim());
  return stmts;
}

// ── History ────────────────────────────────────────────────────────────────
function loadHistory() {
  try { queryHistory = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
  catch (_) { queryHistory = []; }
  renderHistory();
}

function addToHistory(sql, ok, dur) {
  queryHistory.unshift({ sql: sql.trim(), ok, dur, ts: Date.now() });
  if (queryHistory.length > 20) queryHistory.length = 20;
  localStorage.setItem(HIST_KEY, JSON.stringify(queryHistory));
  renderHistory();
}

function renderHistory() {
  const list  = document.getElementById('hist-list');
  const count = document.getElementById('hist-count');
  if (!list) return;
  if (count) count.textContent = queryHistory.length ? String(queryHistory.length) : '';
  if (queryHistory.length === 0) {
    list.innerHTML = '<div style="padding:5px 6px;color:var(--text-3);font-size:11px">No queries yet</div>';
    return;
  }
  list.innerHTML = queryHistory.map((e, i) => {
    const dot  = e.ok === 'explain' ? 'var(--amber)' : e.ok ? 'var(--green)' : 'var(--red)';
    const short = e.sql.length > 55 ? e.sql.slice(0, 55) + '…' : e.sql;
    const d    = new Date(e.ts);
    const time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    return `<div class="hist-item" onclick="histLoad(${i})" title="${esc(e.sql)}">
      <span class="hist-dot" style="background:${dot}"></span>
      <span class="hist-sql">${esc(short)}</span>
      <span class="hist-meta">${esc(e.dur)}</span>
      <span class="hist-meta" style="min-width:30px;text-align:right;opacity:.5">${time}</span>
    </div>`;
  }).join('');
}

function histLoad(i) {
  const e = queryHistory[i];
  if (!e) return;
  editor.setValue(e.sql);
  const last = editor.lineCount() - 1;
  editor.setCursor({ line: last, ch: editor.getLine(last).length });
  editor.focus();
}

function toggleHistory() {
  histOpen = !histOpen;
  document.getElementById('hist-panel').classList.toggle('open', histOpen);
  document.getElementById('hist-bar').classList.toggle('open', histOpen);
}

// ── Rendering ──────────────────────────────────────────────────────────────
const NODE_CFG = {
  Project:        { color: 'var(--text-2)',  bg: 'var(--item-hover)'        },
  Filter:         { color: 'var(--amber)',   bg: 'rgba(245,158,11,.08)'     },
  Limit:          { color: 'var(--cyan)',    bg: 'rgba(6,182,212,.08)'      },
  IndexScan:      { color: 'var(--accent)',  bg: 'var(--accent-dim)'        },
  IndexLookup:    { color: 'var(--violet)',  bg: 'rgba(168,85,247,.08)'     },
  Union:          { color: 'var(--green)',   bg: 'rgba(74,222,128,.08)'     },
  NestedLoopJoin: { color: '#818cf8',        bg: 'rgba(99,102,241,.08)'     },
};

function renderMulti(data) {
  if (!data.results || data.results.length === 0) { showError('Empty response'); return; }
  if (data.results.length === 1) {
    renderOne(data.results[0]);
    return;
  }
  const body  = document.getElementById('results-body');
  const label = document.getElementById('results-label');
  const meta  = document.getElementById('results-meta');
  label.textContent = `${data.results.length} statements`;
  meta.textContent  = data.totalDuration;
  body.innerHTML = `<div class="multi-stack">${data.results.map(buildCard).join('')}</div>`;
  const firstErr = data.results.find(r => r.error);
  if (firstErr) {
    setStatus(`Statement ${data.results.indexOf(firstErr)+1}: ${firstErr.error}`, 'err');
    return;
  }
  const sels = data.results.filter(r => r.columns && r.columns.length > 0);
  if (sels.length > 0) {
    const last = sels[sels.length - 1];
    const rw = last.rowCount === 1 ? '1 row' : `${fmtNum(last.rowCount)} rows`;
    setStatus(`${data.results.length} statements · ${rw} · ${data.totalDuration}`, 'ok');
  } else {
    setStatus(`${data.results.length} statements · ${data.totalDuration}`, 'ok');
  }
}

function renderOne(r) {
  const body  = document.getElementById('results-body');
  const label = document.getElementById('results-label');
  const meta  = document.getElementById('results-meta');

  if (r.error) {
    label.textContent = 'Error';
    meta.textContent  = r.duration;
    body.innerHTML    = msgBox('error', '', r.error);
    setStatus(r.error, 'err');
    return;
  }
  if (r.columns && r.columns.length > 0) {
    label.textContent = 'Data';
    const rw = r.rowCount === 1 ? '1 row' : `${fmtNum(r.rowCount)} rows`;
    meta.textContent  = `${rw} · ${r.duration}`;
    body.innerHTML    = r.rows.length === 0
      ? emptyResult('0 rows returned')
      : renderTable(r.columns, r.rows);
    setStatus(`${rw} · ${r.duration}`, 'ok');
    return;
  }
  if (r.message) {
    if (looksLikeExplain(r.message)) {
      label.textContent = 'Query Plan';
      meta.textContent  = r.duration;
      body.innerHTML    = renderExplain(r.message);
      setStatus(`plan · ${r.duration}`, 'ok');
    } else {
      label.textContent = 'Result';
      meta.textContent  = r.duration;
      body.innerHTML    = msgBox('success', '', r.message);
      setStatus(r.message, 'ok');
    }
  }
}

function buildCard(r, idx) {
  const rowBadge = (r.columns && r.rowCount > 0)
    ? `<span class="stmt-rows">${fmtNum(r.rowCount)} rows</span>` : '';
  const errBadge = r.error ? `<span class="stmt-err-tag">error</span>` : '';
  const header = `<div class="stmt-header">
    <span class="stmt-num">${idx+1}</span>
    <span class="stmt-dur">${r.duration}</span>
    ${rowBadge}${errBadge}
  </div>`;
  let content = '';
  if (r.error) content = msgBox('error', '', r.error);
  else if (r.columns && r.columns.length > 0)
    content = r.rows.length === 0
      ? `<div class="stmt-ok-msg" style="color:var(--text-3)">0 rows</div>`
      : renderTable(r.columns, r.rows);
  else if (r.message)
    content = looksLikeExplain(r.message)
      ? renderExplain(r.message)
      : `<div class="stmt-ok-msg">${SVG_OK}${esc(r.message)}</div>`;
  return `<div class="stmt-card">${header}${content}</div>`;
}

function looksLikeExplain(msg) {
  return /\b(Project|IndexScan|IndexLookup|Filter|Limit|Union|NestedLoopJoin)\b/.test(msg);
}

function renderTable(cols, rows) {
  const num = rows[0].map(v => typeof v === 'number');
  const head = cols.map((c,i) => `<th class="${num[i]?'num':''}">${esc(c)}</th>`).join('');
  const body = rows.map(row => {
    const cells = row.map((v,i) => {
      if (v === null || v === undefined) return `<td><span class="null-val">NULL</span></td>`;
      return `<td class="${num[i]?'num':''}">${esc(String(v))}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  return `<div class="result-wrap">
    <table class="result-table">
      <thead><tr>${head}</tr></thead>
      <tbody>${body}</tbody>
    </table>
  </div>`;
}

// ── Plan tree ─────────────────────────────────────────────────────────────
function parseExplainTree(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const flat = lines.map(line => {
    const spaces  = line.length - line.trimStart().length;
    const trimmed = line.trimStart();
    const si      = trimmed.search(/\s/);
    const type    = si === -1 ? trimmed : trimmed.slice(0, si);
    const rest    = si === -1 ? '' : trimmed.slice(si).trim();
    return { depth: Math.floor(spaces / 2), type, rest, children: [] };
  });
  const roots = [], stack = [];
  for (const node of flat) {
    while (stack.length && stack[stack.length-1].depth >= node.depth) stack.pop();
    (stack.length ? stack[stack.length-1].node.children : roots).push(node);
    stack.push({ node, depth: node.depth });
  }
  return roots;
}

function renderExplain(text) {
  return `<div class="plan-tree">${renderTreeNodes(parseExplainTree(text))}</div>`;
}

function renderTreeNodes(nodes) {
  return nodes.map(node => {
    const cfg  = NODE_CFG[node.type] || { color: 'var(--text-1)', bg: 'var(--glass-hi)' };
    const tip  = nodeTooltip(node.type, node.rest);
    const badge = `<span class="plan-badge"
      style="color:${cfg.color};border-color:${cfg.color}30;background:${cfg.bg}"
      onmouseenter="showTip(event,${q(tip)})" onmouseleave="hideTip()"
    >${esc(node.type)}</span>`;
    const rest     = node.rest ? `<span class="plan-rest">${esc(node.rest)}</span>` : '';
    const children = node.children.length
      ? `<div class="plan-children">${renderTreeNodes(node.children)}</div>` : '';
    return `<div class="plan-node-outer">
      <div class="plan-node-row">${badge}${rest}</div>
      ${children}
    </div>`;
  }).join('');
}

function nodeTooltip(type, rest) {
  const tips = {
    Project:        'Output projection\nSelects and reorders the output columns.',
    Filter:         'Row filter\nEvaluates predicates; discards non-matching rows.',
    Limit:          'Early stop\nShort-circuits scan — avoids reading unneeded pages.',
    IndexScan:      'B-Tree scan\nReads pages in primary-key order.\nCheap for range and point lookups.',
    IndexLookup:    'Secondary index\n2 B-Tree lookups per row:\n  1. index entry → primary key\n  2. primary key → full row\nEfficient only when very selective.',
    Union:          'OR-branch merge\nCombines multiple index scans.\nDeduplicates results by primary key.',
    NestedLoopJoin: 'Nested-loop join\nComplexity: O(|left| × |right|) I/Os.\nFor each left row, scans the entire right child.',
  };
  const base = tips[type] || type;
  return rest ? base + '\n\n' + rest : base;
}

let _tipEl = null;
function getTipEl() {
  if (!_tipEl) {
    _tipEl = document.createElement('div');
    _tipEl.className = 'plan-tip';
    _tipEl.style.cssText = 'position:fixed;display:none;pointer-events:none;z-index:500';
    document.body.appendChild(_tipEl);
  }
  return _tipEl;
}
function showTip(e, text) {
  const t = getTipEl();
  t.textContent = text;
  t.style.display = 'block';
  const pad = 14, w = Math.min(320, window.innerWidth - 20);
  let x = e.clientX + pad, y = e.clientY + pad;
  if (x + w + 10 > window.innerWidth) x = e.clientX - w - pad;
  if (y + t.offsetHeight + 10 > window.innerHeight) y = e.clientY - t.offsetHeight - pad;
  t.style.cssText += `;left:${x}px;top:${y}px;max-width:${w}px`;
}
function hideTip() { if (_tipEl) _tipEl.style.display = 'none'; }

const SVG_OK  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,10.5 12,4"/></svg>`;
const SVG_ERR = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>`;

function msgBox(type, _icon, text) {
  const icon = type === 'success' ? SVG_OK : SVG_ERR;
  return `<div class="msg-box ${type}">
    <span class="msg-icon">${icon}</span>
    <span class="msg-text">${esc(text)}</span>
  </div>`;
}

function emptyResult(msg) {
  return `<div class="empty-state"><p>${esc(msg)}</p></div>`;
}

function showError(msg) {
  document.getElementById('results-body').innerHTML = msgBox('error', '', msg);
  setStatus(msg, 'err');
}

// ── Pool stats ──────────────────────────────────────────────────────────────
async function loadPoolStats() {
  try {
    const s = await apiGet('/api/pool');
    const pct = Math.round(s.hitRatio * 100);
    const dotColor = pct > 80 ? 'var(--green)' : pct > 50 ? 'var(--amber)' : 'var(--red)';
    const shadow   = pct > 80 ? '0 0 5px var(--green)' : '';
    const nums = s.hits + s.misses > 0
      ? `<span class="pool-num">${s.hits}h/${s.misses}m</span>` : '';
    document.getElementById('pool-wrap').innerHTML = `
      <div class="pool-badge">
        <div class="pool-dot" style="background:${dotColor};box-shadow:${shadow}"></div>
        <span>cache ${pct}%</span>
        ${nums}
      </div>`;
  } catch (_) {}
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function setRunning(on) {
  const btn  = document.getElementById('run-btn');
  const body = document.getElementById('results-body');
  if (on) {
    btn.disabled = true;
    document.getElementById('run-icon').outerHTML =
      '<span id="run-icon" class="spinner"></span>';
    body.classList.add('loading');
  } else {
    btn.disabled = false;
    document.getElementById('run-icon').outerHTML =
      '<span id="run-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg></span>';
    body.classList.remove('loading');
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className   = type || '';
}

// ── Utils ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function q(s) { return JSON.stringify(String(s)); }

function fmtNum(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}
